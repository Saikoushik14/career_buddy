version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: careerbuddy_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    depends_on:
      - db
    networks:
      - careerbuddy-network

  nginx:
    image: nginx:alpine
    container_name: careerbuddy_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - careerbuddy-network

  db:
    image: mysql:8.0
    container_name: careerbuddy_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: careerbuddy
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_USER: cb_user
      MYSQL_PASSWORD: cb_password
    ports:
      - "3308:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - careerbuddy-network

networks:
  careerbuddy-network:
    driver: bridge

volumes:
  db_data:
